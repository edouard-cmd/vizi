<!-- ============================================================
     VISIMER — HEAD SNIPPETS
     Copier-coller dans la <head> de votre site web
     Ajustez les chemins selon votre structure (/brand/web/... → /assets/... etc.)
============================================================ -->

<!-- Theme color (barre d'URL mobile) -->
<meta name="theme-color" content="#0A1520" />
<meta name="color-scheme" content="dark light" />

<!-- Favicons -->
<link rel="icon" href="/brand/web/favicon.svg" type="image/svg+xml" />
<link rel="icon" href="/brand/web/favicon-32.png" sizes="32x32" type="image/png" />
<link rel="icon" href="/brand/web/favicon-16.png" sizes="16x16" type="image/png" />
<link rel="alternate icon" href="/brand/web/favicon-32.png" />

<!-- Apple -->
<link rel="apple-touch-icon" href="/brand/web/apple-touch-icon.png" sizes="180x180" />
<meta name="apple-mobile-web-app-title" content="Visimer" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<!-- PWA Manifest -->
<link rel="manifest" href="/brand/web/site.webmanifest" />
<meta name="application-name" content="Visimer" />
<meta name="msapplication-config" content="/brand/web/browserconfig.xml" />
<meta name="msapplication-TileColor" content="#0A1520" />

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Visimer" />
<meta property="og:title" content="Visimer — Prédiction de turbidité côtière" />
<meta property="og:description" content="L'app de visi sous-marine pour chasseurs et apnéistes. Vent, houle, marées, sédiments — identifiez les meilleurs créneaux de plongée." />
<meta property="og:image" content="/brand/web/og-image.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:image:alt" content="Visimer" />
<meta property="og:locale" content="fr_FR" />

<!-- Twitter / X -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Visimer — Prédiction de turbidité côtière" />
<meta name="twitter:description" content="L'app de visi sous-marine pour chasseurs et apnéistes." />
<meta name="twitter:image" content="/brand/web/twitter-card.png" />
